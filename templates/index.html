<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet Reservation | Quick Reserve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=EUR"></script>
    <style>
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="main-card" class="bg-white rounded-2xl shadow-xl overflow-hidden max-w-md w-full transition-all">
        <div class="bg-indigo-600 h-32 flex items-center justify-center">
            <h1 class="text-white text-3xl font-extrabold tracking-tight">THE BUFFET</h1>
        </div>

        <div class="p-8">
            <div id="form-container">
                <h2 class="text-xl font-semibold text-gray-800 mb-2">Secure Your Table</h2>
                <p class="text-gray-500 text-sm mb-6">Reservation fee: <span class="font-bold text-indigo-600">25.00€</span></p>
                
                <form id="resForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">First Name</label>
                        <input type="text" id="first_name" placeholder="John" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Surname</label>
                        <input type="text" id="last_name" placeholder="Doe" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Select your Option</label>
                        <select id="package_select" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                            <option value="buffet_1" data-price="25.00">1 Person Buffet - 25.00€</option>
                            <option value="buffet_2" data-price="45.00">2 Person Special - 45.00€</option>
                            <option value="food_1" data-price="15.00">Food Item 1 - 15.00€</option>
                            <option value="food_2" data-price="18.00">Food Item 2 - 18.00€</option>
                        </select>
                    </div>
                    
                    <div id="paypal-button-container" class="mt-8"></div>
                </form>
            </div>

            <div id="success-message" class="hidden p-4 bg-green-100 text-green-700 rounded text-center">
                 <h2>Success! Reservation Confirmed.</h2>
            </div>
        </div>
    </div>

    <script src="/static/paypal-logic.js"></script>
</body>
</html>
