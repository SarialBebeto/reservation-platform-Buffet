<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet Reservation | Quick Reserve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <style>
        /* Custom styles for the phone input */
        .iti { width: 100%; }
        .iti__flag { background-image: url('https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/img/flags.png'); }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="main-card" class="bg-white rounded-2xl shadow-xl overflow-hidden max-w-md w-full transition-all">
        <div class="bg-indigo-600 h-32 flex items-center justify-center">
            <h1 class="text-white text-3xl font-extrabold tracking-tight">THE BUFFET</h1>
        </div>

        <div class="p-8">
            <div id="form-container">
                <h2 class="text-xl font-semibold text-gray-800 mb-2">Reserve now</h2>
                
                <form id="resForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">First Name</label>
                        <input type="text" id="first_name" name="first_name" placeholder="John" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Surname</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Doe" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Phone Number</label>
                        <input type="tel" id="phone" name="phone_input" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                        <div id="phone-msg" class="text-[10px] mt-1 text-gray-500 font-medium"></div>
                        <input type="hidden" name="phone" id="phone_full">
                    </div>
                    <input type="hidden" name="date" value="2026-04-15"> <input type="hidden" name="time" value="19:00">
                    <div class="space-y-3">
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Select Items</label>
                        
                        <div class="flex items-center justify-between p-2 border rounded">
                            <span>Buffet Single (25€)</span>
                            <input type="number" name="qty_buffet_1" value="0" min="0" class="item-qty w-16 p-1 border rounded" data-price="25">
                        </div>

                        <div class="flex items-center justify-between p-2 border rounded">
                            <span>Buffet Double (45€)</span>
                            <input type="number" name="qty_buffet_2" value="0" min="0" class="item-qty w-16 p-1 border rounded" data-price="45">
                        </div>

                        <div class="flex items-center justify-between p-2 border rounded">
                            <span>Buffet Kids (10€)</span>
                            <input type="number" name="qty_buffet_3" value="0" min="0" class="item-qty w-16 p-1 border rounded" data-price="10">
                        </div>

                        <div class="flex items-center justify-between p-2 border rounded">
                            <span>Taro (20€/pc)</span>
                            <input type="number" name="qty_taro" value="0" min="0" class="item-qty w-16 p-1 border rounded" data-price="20">
                        </div>

                        <div class="flex items-center justify-between p-2 border rounded">
                            <span>Brochettes (2€/pc)</span>
                            <input type="number" name="qty_brochettes" value="0" min="0" class="item-qty w-16 p-1 border rounded" data-price="2">
                        </div>
                    </div>

                    <div class="mt-4 text-right font-bold text-indigo-600">
                        Total: <span id="total-display">0.00</span>€

                    </div>
                    <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-300">
                        Request Reservation
                    </button>
                </form>
            </div>
                <div id="success-message" class="hidden p-6 bg-green-50 border border-green-200 rounded-lg text-center mt-4">
                    <h3 class="text-green-800 font-bold text-lg">Reservation Confirmed! 🎉</h3>
                    <p class="text-green-700 text-sm">Check your email for your ticket.</p>
                </div>
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
