<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet Reservation | Quick Reserve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AYZhcGR7jb8Lp3_wCyILNA8ZGaZC-vqNJQxxFIZAABqooCY8Qh7iZXbMNSNsz7APbhzdsd4wD8do0yIR&currency=EUR"></script>
    <style>
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="main-card" class="bg-white rounded-2xl shadow-xl overflow-hidden max-w-md w-full transition-all">
        <div class="bg-indigo-600 h-32 flex items-center justify-center">
            <h1 class="text-white text-3xl font-extrabold tracking-tight">THE BUFFET</h1>
        </div>

        <div class="p-8">
            <div id="form-container">
                <h2 class="text-xl font-semibold text-gray-800 mb-2">Reserve Your Table</h2>
                
                <form id="resForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">First Name</label>
                        <input type="text" id="first_name" placeholder="John" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Surname</label>
                        <input type="text" id="last_name" placeholder="Doe" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    </div>

                    <!-- <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Date</label>
                            <input type="date" id="res_date" required class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Time</label>
                            <input type="time" id="res_time" required class="w-full p-2 border rounded">
                        </div>
                    </div> -->

                    <div>
                        <label class="block text-xs font-medium text-gray-700 uppercase mb-1">Select your Option</label>
                        <select id="package_select" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                            <option value="buffet_1" data-price="25.00">Single - 25.00€</option>
                            <option value="buffet_2" data-price="45.00">Duo - 45.00€</option>
                            <option value="buffet_3" data-price="10.00">Kids - 10.00€</option>
                            <option value="food_1" data-price="20.00">Taro - 20.00€</option>
                            <option value="food_2" data-price="2.00">Brochettes  - 2.00€</option>
                            <option value="food_3" data-price="1.00">Sushi - 1.00€</option>
                        </select>
                    </div>
                    
                    <div id="paypal-button-container" class="mt-8"></div>
                </form>
            </div>

                <div id="success-message" class="hidden p-6 bg-green-50 border border-green-200 rounded-lg text-center mt-4">
                    <h3 class="text-green-800 font-bold text-lg">Reservation Confirmed! 🎉</h3>
                    <p class="text-green-700 text-sm">Check your email for your ticket.</p>
                </div>
        </div>
    </div>

    <script src="/static/paypal-logic.js"></script>
</body>
</html>
