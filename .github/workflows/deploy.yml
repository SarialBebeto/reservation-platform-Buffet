name: Deploy Buffet App

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: sarialbebeto/buffet-app:latest
      
      # - name: Deploy to VM via SSH
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.VM_IP }}
      #     username: devops
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       microk8s kubectl rollout restart deployment/buffet-deployment -n production

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: devops
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/devops/reservation-platform-Buffet
            git pull origin main
            microk8s helm3 upgrade --install buffet-release ./buffet-app --namespace production --create-namespace

            echo "Waiting for Postgres to be created..."
            sleep 10

            echo "waiting for Postgres specifically to be ready..."
            microk8s kubectl rollout status deployment/buffet-postgres -n production || echo "Postgres deployment not found yet"

            echo "Restarting app pods to pick up new database connection..."
            microk8s kubectl rollout restart deployment/buffet-release-buffet-app -n production

            microk8s kubectl get all -n production

         